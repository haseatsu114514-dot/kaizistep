<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>⚪︎⚪︎開示ステップメーカー</title>
  <meta name="description" content="10.6秒動画にテロップを入れて保存できるメーカー。">
  <meta name="theme-color" content="#0f1115">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="開示ステップ">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    :root {
      --bg: #eef1ee;
      --surface: #ffffff;
      --ink: #171a1f;
      --muted: #68716e;
      --line: #d7ded8;
      --soft: #f6f8f5;
      --stage: #0f1115;
      --accent: #0f766e;
      --accent-deep: #0b5f59;
      --yellow: #f4b63f;
      --danger: #b4232f;
      --ok: #17643e;
      --shadow: 0 12px 28px rgba(20, 28, 24, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background: linear-gradient(180deg, #e4e9e4 0, var(--bg) 260px);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      min-height: 44px;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 10px 13px;
      cursor: pointer;
      font-weight: 800;
      touch-action: manipulation;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    input,
    textarea,
    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 10px 11px;
    }

    textarea {
      min-height: 82px;
      line-height: 1.5;
      resize: vertical;
    }

    input[type="range"] {
      min-height: 36px;
      padding: 0;
      accent-color: var(--accent);
    }

    input[type="radio"] {
      width: auto;
      min-height: 0;
      accent-color: var(--accent);
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 800;
    }

    .app-shell {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 14px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0 14px;
    }

    .topbar h1 {
      margin: 0;
      font-size: clamp(1.34rem, 4vw, 2rem);
      line-height: 1.18;
      letter-spacing: 0;
    }

    .clip-badge {
      flex: 0 0 auto;
      border: 1px solid #c9d3cc;
      border-radius: 999px;
      padding: 6px 11px;
      background: rgba(255, 255, 255, 0.7);
      color: #24312d;
      font-size: 0.82rem;
      font-weight: 900;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 420px;
      gap: 14px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      padding: 12px;
    }

    .panel-header h2 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .panel-body {
      padding: 12px;
    }

    .preview-panel {
      position: sticky;
      top: 12px;
      z-index: 20;
    }

    .preview-stage {
      --caption-font-size: 54px;
      position: relative;
      display: grid;
      place-items: center;
      width: 100%;
      aspect-ratio: 73 / 60;
      overflow: hidden;
      border-radius: 8px;
      background: var(--stage);
    }

    .preview-stage video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: var(--stage);
    }

    .caption-preview {
      position: absolute;
      left: 50%;
      top: 80%;
      width: 90%;
      display: block;
      pointer-events: none;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      text-align: center;
      font-size: var(--caption-font-size);
      font-weight: 800;
      line-height: 1.16;
      letter-spacing: 0;
      opacity: 0;
      transform: translate(-50%, -50%);
    }

    .caption-preview.is-visible {
      opacity: 1;
    }

    .final-caption-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
    }

    .final-caption-layer.is-visible {
      opacity: 1;
    }

    .final-caption {
      position: absolute;
      display: block;
      color: #fff;
      font-size: clamp(12px, 3.2vw, 20px);
      font-weight: 900;
      line-height: 1.14;
      letter-spacing: 0;
      text-align: center;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      transform: translate(-50%, -50%);
      -webkit-text-stroke: 1.5px #050608;
      text-shadow:
        1px 1px 0 #050608,
        -1px 1px 0 #050608,
        1px -1px 0 #050608,
        -1px -1px 0 #050608;
    }

    .preview-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 800;
    }

    .meter {
      position: relative;
      flex: 1 1 220px;
      height: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #e1e7e1;
    }

    .meter span {
      position: absolute;
      inset: 0 auto 0 0;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--yellow));
    }

    .step-strip {
      position: relative;
      display: block;
      height: 44px;
      margin-top: 12px;
      overflow: hidden;
      border: 1px solid #cfd7d1;
      border-radius: 8px;
      background: #eef2ee;
    }

    .strip-segment {
      position: absolute;
      top: 0;
      bottom: 0;
      min-width: 18px;
      border-right: 1px solid rgba(255, 255, 255, 0.68);
      background: var(--segment-color, #f4b63f);
      color: #1c1608;
      padding: 6px 7px;
      text-align: left;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 0.76rem;
      font-weight: 900;
      cursor: pointer;
    }

    .strip-segment.is-active {
      outline: 3px solid rgba(15, 118, 110, 0.32);
      outline-offset: -3px;
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .range-line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 56px;
      align-items: center;
      gap: 10px;
    }

    .value-pill {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--soft);
      color: #26312d;
      font-size: 0.86rem;
      font-weight: 900;
    }

    .steps-list {
      display: grid;
      gap: 10px;
    }

    .final-captions-list {
      display: grid;
      gap: 8px;
    }

    .layout-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfb;
    }

    .layout-card summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      cursor: pointer;
    }

    .layout-card summary::-webkit-details-marker {
      display: none;
    }

    .layout-card strong {
      font-size: 0.88rem;
      line-height: 1.2;
    }

    .layout-card textarea {
      margin-top: 8px;
      min-height: 62px;
    }

    .step-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfb;
      overflow: hidden;
    }

    .step-card summary {
      list-style: none;
      cursor: pointer;
    }

    .step-card summary::-webkit-details-marker {
      display: none;
    }

    .step-card.is-active {
      border-color: rgba(15, 118, 110, 0.85);
      box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.12);
    }

    .step-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px solid #e2e7e1;
      padding: 9px 10px;
      background: #f1f4f1;
    }

    .fold-label {
      flex: 0 0 auto;
      border: 1px solid #d4ddd5;
      border-radius: 999px;
      padding: 4px 8px;
      background: #fff;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 900;
    }

    details[open] .fold-label::before {
      content: "縮小";
    }

    details:not([open]) .fold-label::before {
      content: "編集";
    }

    .step-title {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .step-title strong {
      font-size: 0.9rem;
      line-height: 1.2;
    }

    .step-title span {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .step-body {
      display: grid;
      gap: 10px;
      padding: 10px;
    }

    .end-line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 82px;
      gap: 9px;
      align-items: center;
    }

    .end-number {
      text-align: center;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }

    .orientation-tip {
      display: none;
      margin: 0 0 10px;
      border: 1px solid #ead7a1;
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff7df;
      color: #5d4511;
      font-size: 0.88rem;
      font-weight: 900;
    }

    .ghost-button {
      border-color: var(--line);
      background: var(--soft);
      color: #25312d;
    }

    .primary-button {
      border-color: var(--accent-deep);
      background: var(--accent);
      color: #fff;
    }

    .warm-button {
      border-color: #c48216;
      background: var(--yellow);
      color: #21190a;
    }

    .action-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .status {
      min-height: 1.35em;
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.45;
    }

    .status.is-ok {
      color: var(--ok);
    }

    .status.is-error {
      color: var(--danger);
    }

    @media (max-width: 760px) {
      .app-shell {
        padding: 10px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .clip-badge {
        width: 100%;
        text-align: center;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .preview-panel {
        top: 0;
      }
    }

    @media (max-width: 700px) and (orientation: portrait) {
      .orientation-tip {
        display: grid;
        place-items: center;
        min-height: calc(100vh - 82px);
        text-align: center;
        font-size: 1.05rem;
        line-height: 1.6;
      }

      .workspace {
        display: none;
      }
    }

    @media (max-width: 520px) {
      .panel-header {
        align-items: flex-start;
        flex-direction: column;
      }

      .end-line {
        grid-template-columns: 1fr 74px;
      }

    }

    @media (orientation: landscape) and (max-height: 560px) {
      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        background: var(--bg);
      }

      button {
        min-height: 38px;
        padding: 8px 10px;
      }

      textarea {
        min-height: 70px;
      }

      .app-shell {
        width: 100%;
        height: 100vh;
        height: 100dvh;
        padding: 8px;
        overflow: hidden;
      }

      .topbar {
        display: none;
      }

      .workspace {
        height: 100%;
        grid-template-columns: minmax(260px, 46vw) minmax(260px, 1fr);
        gap: 8px;
        align-items: stretch;
      }

      .panel {
        min-height: 0;
        box-shadow: none;
      }

      .panel-header {
        padding: 8px 10px;
      }

      .panel-body {
        padding: 8px;
      }

      .preview-panel {
        position: sticky;
        top: 8px;
        height: calc(100vh - 16px);
        height: calc(100dvh - 16px);
        align-self: start;
      }

      .preview-panel .panel-header {
        display: none;
      }

      .preview-panel .panel-body {
        display: grid;
        place-items: center;
        height: 100%;
        padding: 4px;
        overflow: hidden;
      }

      .preview-stage {
        width: min(100%, calc((100vh - 24px) * 73 / 60));
        width: min(100%, calc((100dvh - 24px) * 73 / 60));
        max-height: calc(100vh - 24px);
        max-height: calc(100dvh - 24px);
        margin: 0 auto;
      }

      .caption-preview {
        --caption-font-size: 34px;
      }

      .final-caption {
        font-size: clamp(10px, 2.35vw, 15px);
        -webkit-text-stroke: 1px #050608;
      }

      .preview-meta,
      .step-strip {
        display: none;
      }

      .workspace > .panel:not(.preview-panel) {
        height: calc(100vh - 16px);
        height: calc(100dvh - 16px);
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      .controls {
        gap: 8px;
      }

      .steps-list,
      .final-captions-list {
        gap: 7px;
      }

      .layout-card,
      .step-card {
        border-radius: 7px;
      }

      .layout-card {
        padding: 8px;
      }

      .step-head {
        padding: 8px;
      }

      .step-body {
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <h1>⚪︎⚪︎開示ステップメーカー</h1>
      <span class="clip-badge">0:00-0:10.6</span>
    </header>

    <div class="orientation-tip">スマホでは横画面にして使ってください。<br>横向きにすると編集画面が開きます。</div>

    <div class="workspace">
      <section class="panel preview-panel">
        <div class="panel-header">
          <h2>プレビュー</h2>
          <button id="playFromStartBtn" class="ghost-button" type="button">最初から再生</button>
        </div>
        <div class="panel-body">
          <div id="previewStage" class="preview-stage" data-position="bottom">
            <video id="previewVideo" src="assets/koukai-step-source.mp4" controls playsinline preload="metadata"></video>
            <div id="captionPreview" class="caption-preview"></div>
            <div id="finalCaptionLayer" class="final-caption-layer" aria-hidden="true"></div>
          </div>
          <div class="preview-meta">
            <span id="timeText">0.0 / 10.6秒</span>
            <div class="meter" aria-hidden="true"><span id="progressBar"></span></div>
            <span id="activeText">1人目: 0.0-2.1秒</span>
          </div>
          <div id="stepStrip" class="step-strip" aria-label="表示ステップ"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>編集</h2>
        </div>
        <div class="panel-body controls">
          <div class="field">
            <label>通常テロップ（固定時間）</label>
            <div id="stepsList" class="steps-list"></div>
          </div>

          <div class="field">
            <label>ラスト配置テロップ（7.4秒〜ラスト）</label>
            <div id="finalCaptionsList" class="final-captions-list"></div>
          </div>

          <div class="action-grid">
            <button id="downloadBtn" class="primary-button" type="button">カメラロール保存</button>
          </div>
          <p id="statusText" class="status"></p>
        </div>
      </section>
    </div>
  </main>

  <script>
    const MAX_SECONDS = 10.6;
    const MIN_STEP_SECONDS = 0.5;
    const FINAL_LAYOUT_START = 7.4;
    const CAPTION_FONT_SIZE = 50;
    const DEFAULT_VIDEO_SRC = "assets/koukai-step-source.mp4";
    const STORAGE_KEY = "koukai-step-maker-settings-v5";
    const SEGMENT_COLORS = ["#78c6a3", "#8cc7ff", "#f2a0bd", "#8cc7ff", "#78c6a3", "#f4b63f"];
    const DEFAULT_STEPS = [
      { text: "1人目(緑♀)", start: 0, end: 2.1 },
      { text: "2人目(水色♂)", start: 2.2, end: 3.4 },
      { text: "3人目(ピンク♀)", start: 3.5, end: 4.3 },
      { text: "4人目(水色♀)", start: 4.3, end: 5.1 },
      { text: "5人目(緑♂)", start: 5.1, end: 7.2 }
    ];
    const DEFAULT_FINAL_CAPTIONS = [
      { text: "(こいつやば)", x: 23, y: 36, width: 35 },
      { text: "（〜いいよね）", x: 16, y: 55, width: 38 },
      { text: "(なんか一人\nとんでもない奴いたな？)", x: 37, y: 69, width: 45 },
      { text: "(何だ今の？)", x: 60, y: 77, width: 30 },
      { text: "(なんかいたな…)", x: 77, y: 87, width: 34 }
    ];

    const previewVideo = document.getElementById("previewVideo");
    const previewStage = document.getElementById("previewStage");
    const captionPreview = document.getElementById("captionPreview");
    const finalCaptionLayer = document.getElementById("finalCaptionLayer");
    const playFromStartBtn = document.getElementById("playFromStartBtn");
    const stepsList = document.getElementById("stepsList");
    const finalCaptionsList = document.getElementById("finalCaptionsList");
    const stepStrip = document.getElementById("stepStrip");
    const downloadBtn = document.getElementById("downloadBtn");
    const statusText = document.getElementById("statusText");
    const timeText = document.getElementById("timeText");
    const activeText = document.getElementById("activeText");
    const progressBar = document.getElementById("progressBar");

    const state = {
      sourceUrl: DEFAULT_VIDEO_SRC,
      sourceObjectUrl: "",
      generatedBlob: null,
      generatedUrl: "",
      generatedFile: null,
      generatedSignature: "",
      outputExt: "webm",
      steps: DEFAULT_STEPS.map((step) => ({ ...step })),
      finalCaptions: DEFAULT_FINAL_CAPTIONS.map((caption) => ({ ...caption }))
    };

    loadSettings();
    normalizeSteps();
    bindEvents();
    renderSteps();
    renderFinalCaptionControls();
    updateAll();

    function bindEvents() {
      playFromStartBtn.addEventListener("click", playPreviewFromStart);
      downloadBtn.addEventListener("click", handleCameraRollSaveClick);

      stepsList.addEventListener("input", handleStepInput);
      stepsList.addEventListener("change", handleStepInput);
      finalCaptionsList.addEventListener("input", handleFinalCaptionInput);
      stepStrip.addEventListener("click", handleStripClick);

      previewVideo.addEventListener("loadedmetadata", () => {
        if (previewVideo.videoWidth && previewVideo.videoHeight) {
          previewStage.style.aspectRatio = previewVideo.videoWidth + " / " + previewVideo.videoHeight;
        }
        updateAll();
      });
      previewVideo.addEventListener("timeupdate", () => {
        enforcePreviewLimit();
        updatePreviewTiming();
      });
      previewVideo.addEventListener("seeked", updatePreviewTiming);
      previewVideo.addEventListener("play", updatePreviewTiming);
      previewVideo.addEventListener("pause", updatePreviewTiming);
      window.addEventListener("resize", updateAll);
      window.addEventListener("orientationchange", updateAll);
    }

    function getStyleSettings() {
      return {
        fontSize: CAPTION_FONT_SIZE
      };
    }

    function getTimelineSteps() {
      return state.steps.map((step, index) => {
        const start = clamp(roundToTenth(Number(step.start) || 0), 0, MAX_SECONDS - MIN_STEP_SECONDS);
        const end = clamp(roundToTenth(Number(step.end) || start + MIN_STEP_SECONDS), start + MIN_STEP_SECONDS, MAX_SECONDS);
        return {
          index,
          text: step.text.trim() || " ",
          start,
          end,
          duration: end - start
        };
      });
    }

    function updateAll() {
      const settings = getStyleSettings();
      applyPreviewStyle(settings);
      renderFinalCaptionLayer();
      renderStepStrip();
      updatePreviewTiming();
    }

    function renderSteps() {
      const timelineSteps = getTimelineSteps();
      stepsList.innerHTML = "";

      timelineSteps.forEach((step, index) => {
        const card = document.createElement("details");
        card.className = "step-card";
        card.dataset.index = String(index);
        card.open = true;
        card.innerHTML = `
          <summary class="step-head">
            <div class="step-title">
              <strong>${getPersonLabel(index)}</strong>
              <span>${step.start.toFixed(1)}秒から ${step.end.toFixed(1)}秒まで</span>
            </div>
            <span class="fold-label" aria-hidden="true"></span>
          </summary>
          <div class="step-body">
            <div>
              <label for="stepText${index}">テロップ</label>
              <textarea id="stepText${index}" class="step-text" data-field="text" maxlength="120">${escapeHtml(state.steps[index].text)}</textarea>
            </div>
          </div>
        `;
        stepsList.appendChild(card);
      });
    }

    function renderFinalCaptionControls() {
      finalCaptionsList.innerHTML = "";

      state.finalCaptions.forEach((caption, index) => {
        const card = document.createElement("details");
        card.className = "layout-card";
        card.dataset.index = String(index);
        card.open = true;
        card.innerHTML = `
          <summary>
            <strong>固定テロップ ${index + 1}</strong>
            <span class="fold-label" aria-hidden="true"></span>
          </summary>
          <textarea class="final-caption-text" data-field="finalText" maxlength="90">${escapeHtml(caption.text)}</textarea>
        `;
        finalCaptionsList.appendChild(card);
      });
    }

    function renderFinalCaptionLayer() {
      finalCaptionLayer.innerHTML = "";

      state.finalCaptions.forEach((caption, index) => {
        const item = document.createElement("span");
        item.className = "final-caption";
        item.dataset.index = String(index);
        item.style.left = caption.x + "%";
        item.style.top = caption.y + "%";
        item.style.width = caption.width + "%";
        item.textContent = caption.text;
        finalCaptionLayer.appendChild(item);
      });
    }

    function renderStepStrip() {
      const timelineSteps = getTimelineSteps();
      const current = Math.min(previewVideo.currentTime || 0, MAX_SECONDS);
      const active = getActiveStep(current);
      stepStrip.innerHTML = "";

      timelineSteps.forEach((step) => {
        const segment = document.createElement("button");
        segment.type = "button";
        segment.className = "strip-segment";
        segment.dataset.index = String(step.index);
        segment.style.left = ((step.start / MAX_SECONDS) * 100) + "%";
        segment.style.width = ((step.duration / MAX_SECONDS) * 100) + "%";
        segment.style.setProperty("--segment-color", SEGMENT_COLORS[step.index % SEGMENT_COLORS.length]);
        segment.textContent = getPersonLabel(step.index) + "  " + step.start.toFixed(1) + "-" + step.end.toFixed(1);
        segment.classList.toggle("is-active", Boolean(active && active.index === step.index));
        stepStrip.appendChild(segment);
      });

      const finalSegment = document.createElement("button");
      finalSegment.type = "button";
      finalSegment.className = "strip-segment";
      finalSegment.dataset.final = "true";
      finalSegment.style.left = ((FINAL_LAYOUT_START / MAX_SECONDS) * 100) + "%";
      finalSegment.style.width = (((MAX_SECONDS - FINAL_LAYOUT_START) / MAX_SECONDS) * 100) + "%";
      finalSegment.style.setProperty("--segment-color", "#d7c7ff");
      finalSegment.textContent = "ラスト5個  " + FINAL_LAYOUT_START.toFixed(1) + "-" + MAX_SECONDS.toFixed(1);
      finalSegment.classList.toggle("is-active", current >= FINAL_LAYOUT_START);
      stepStrip.appendChild(finalSegment);
    }

    function handleStepInput(event) {
      const card = event.target.closest(".step-card");
      if (!card) {
        return;
      }

      const index = Number(card.dataset.index);
      const field = event.target.dataset.field;
      if (!Number.isInteger(index) || !field) {
        return;
      }

      clearGeneratedOutput();
      setStatus("編集内容を反映しました。カメラロール保存を押すと準備します。", "");

      if (field === "text") {
        state.steps[index].text = event.target.value;
        updateAll();
        saveSettings();
      }
    }

    function handleFinalCaptionInput(event) {
      const card = event.target.closest(".layout-card");
      if (!card || event.target.dataset.field !== "finalText") {
        return;
      }

      const index = Number(card.dataset.index);
      if (!Number.isInteger(index) || !state.finalCaptions[index]) {
        return;
      }

      clearGeneratedOutput();
      setStatus("編集内容を反映しました。カメラロール保存を押すと準備します。", "");
      state.finalCaptions[index].text = event.target.value;
      renderFinalCaptionLayer();
      updatePreviewTiming();
      saveSettings();
    }

    function handleStripClick(event) {
      const segment = event.target.closest(".strip-segment");
      if (!segment) {
        return;
      }

      if (segment.dataset.final === "true") {
        previewVideo.currentTime = FINAL_LAYOUT_START;
        updatePreviewTiming();
        return;
      }

      const step = getTimelineSteps()[Number(segment.dataset.index)];
      if (!step) {
        return;
      }

      previewVideo.currentTime = step.start;
      updatePreviewTiming();
    }

    function normalizeSteps() {
      const normalized = state.steps
        .map((step) => {
          const start = clamp(roundToTenth(Number(step.start) || 0), 0, MAX_SECONDS - MIN_STEP_SECONDS);
          const end = clamp(roundToTenth(Number(step.end) || start + MIN_STEP_SECONDS), start + MIN_STEP_SECONDS, MAX_SECONDS);
          return {
            text: typeof step.text === "string" ? step.text : "",
            start,
            end
          };
        })
        .sort((a, b) => a.start - b.start || a.end - b.end);

      if (!normalized.length) {
        normalized.push(...DEFAULT_STEPS.map((step) => ({ ...step })));
      }

      state.steps = normalized;
    }

    function getActiveStep(currentTime) {
      return getTimelineSteps().find((step) => currentTime >= step.start && currentTime <= step.end) || null;
    }

    function applyPreviewStyle(settings) {
      const previewFontSize = getPreviewFontSize(settings);
      const strokeWidth = Math.max(1, Math.round(previewFontSize * 0.045));
      captionPreview.style.setProperty("--caption-font-size", previewFontSize + "px");
      captionPreview.style.color = "#ffffff";
      captionPreview.style.webkitTextStroke = strokeWidth + "px #050608";
      captionPreview.style.textShadow = buildTextShadow("#050608", strokeWidth);
    }

    function getPreviewFontSize(settings) {
      if (window.matchMedia("(orientation: landscape) and (max-height: 560px)").matches) {
        return Math.min(settings.fontSize, 34);
      }
      return settings.fontSize;
    }

    function updatePreviewTiming() {
      const current = Math.min(previewVideo.currentTime || 0, MAX_SECONDS);
      const percent = clamp((current / MAX_SECONDS) * 100, 0, 100);
      const active = getActiveStep(current);
      const isFinalLayout = current >= FINAL_LAYOUT_START;

      if (isFinalLayout) {
        captionPreview.textContent = "";
        captionPreview.classList.remove("is-visible");
        finalCaptionLayer.classList.add("is-visible");
        activeText.textContent = "ラスト配置: 7.4-" + MAX_SECONDS.toFixed(1) + "秒";
      } else if (active) {
        finalCaptionLayer.classList.remove("is-visible");
        captionPreview.textContent = active.text;
        captionPreview.classList.add("is-visible");
        activeText.textContent = getPersonLabel(active.index) + ": " + active.start.toFixed(1) + "-" + active.end.toFixed(1) + "秒";
      } else {
        finalCaptionLayer.classList.remove("is-visible");
        captionPreview.textContent = "";
        captionPreview.classList.remove("is-visible");
        activeText.textContent = "表示なし";
      }

      document.querySelectorAll(".step-card").forEach((card) => {
        const index = Number(card.dataset.index);
        card.classList.toggle("is-active", Boolean(active && active.index === index));
      });

      timeText.textContent = current.toFixed(1) + " / " + MAX_SECONDS.toFixed(1) + "秒";
      progressBar.style.width = percent + "%";
      renderStepStrip();
    }

    function enforcePreviewLimit() {
      if (previewVideo.currentTime > MAX_SECONDS) {
        previewVideo.pause();
        previewVideo.currentTime = MAX_SECONDS;
      }
    }

    function getPersonLabel(index) {
      return (index + 1) + "人目";
    }

    async function playPreviewFromStart() {
      previewVideo.currentTime = 0;
      try {
        await previewVideo.play();
      } catch (error) {
        setStatus("再生ボタンをもう一度押してください。", "error");
      }
    }

    async function handleCameraRollSaveClick() {
      if (hasCurrentGeneratedVideo()) {
        await openCameraRollSaveMenu();
        return;
      }

      await renderCaptionedVideo();
    }

    function hasCurrentGeneratedVideo() {
      return Boolean(
        state.generatedBlob &&
        state.generatedFile &&
        state.generatedSignature === buildRenderSignature()
      );
    }

    async function renderCaptionedVideo() {
      if (!window.MediaRecorder || !HTMLCanvasElement.prototype.captureStream) {
        setStatus("このブラウザは動画の保存準備に対応していません。ChromeかSafariの最新版で開いてください。", "error");
        return;
      }

      const renderSignature = buildRenderSignature();
      downloadBtn.disabled = true;
      downloadBtn.textContent = "保存準備中";
      clearGeneratedOutput();
      setStatus("保存準備中です。画面を閉じずにお待ちください。", "");

      try {
        const settings = getStyleSettings();
        const timelineSteps = getTimelineSteps();
        const renderVideo = document.createElement("video");
        renderVideo.src = state.sourceUrl;
        renderVideo.crossOrigin = "anonymous";
        renderVideo.muted = false;
        renderVideo.playsInline = true;
        renderVideo.preload = "auto";

        await waitForEvent(renderVideo, "loadedmetadata");
        const renderSeconds = Math.min(MAX_SECONDS, renderVideo.duration || MAX_SECONDS);
        const canvas = document.createElement("canvas");
        const scale = getCanvasScale(renderVideo);
        canvas.width = Math.max(2, Math.round(renderVideo.videoWidth * scale));
        canvas.height = Math.max(2, Math.round(renderVideo.videoHeight * scale));

        const ctx = canvas.getContext("2d");
        const canvasStream = canvas.captureStream(30);
        const combinedStream = new MediaStream(canvasStream.getVideoTracks());
        const audioContext = tryCreateAudioContext(renderVideo, combinedStream);
        const mimeType = chooseMimeType();
        const recorder = new MediaRecorder(combinedStream, mimeType ? { mimeType } : undefined);
        const chunks = [];

        recorder.addEventListener("dataavailable", (event) => {
          if (event.data && event.data.size > 0) {
            chunks.push(event.data);
          }
        });

        const stopped = new Promise((resolve) => {
          recorder.addEventListener("stop", resolve, { once: true });
        });

        renderVideo.currentTime = 0;
        await waitForReadyFrame(renderVideo);
        drawVideoFrame(ctx, renderVideo, settings, timelineSteps, 0, scale);
        recorder.start(200);
        await renderVideo.play();
        await drawUntilDone(ctx, renderVideo, settings, timelineSteps, renderSeconds, scale);
        recorder.stop();
        await stopped;
        renderVideo.pause();

        if (audioContext) {
          await audioContext.close();
        }

        const blobType = recorder.mimeType || mimeType || "video/webm";
        const blob = new Blob(chunks, { type: blobType });
        const ext = blobType.includes("mp4") ? "mp4" : "webm";
        const filename = "koukai-step-maker-" + buildTimestamp() + "." + ext;

        state.outputExt = ext;
        state.generatedBlob = blob;
        state.generatedFile = new File([blob], filename, { type: blobType });
        state.generatedUrl = URL.createObjectURL(blob);
        state.generatedSignature = renderSignature;
        setStatus("保存準備ができました。もう一度「カメラロール保存」を押してください。", "ok");
      } catch (error) {
        setStatus("保存準備に失敗しました: " + error.message, "error");
      } finally {
        downloadBtn.disabled = false;
        downloadBtn.textContent = "カメラロール保存";
      }
    }

    function tryCreateAudioContext(video, stream) {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) {
        return null;
      }

      try {
        const audioContext = new AudioContextClass();
        const source = audioContext.createMediaElementSource(video);
        const destination = audioContext.createMediaStreamDestination();
        source.connect(destination);
        destination.stream.getAudioTracks().forEach((track) => stream.addTrack(track));
        return audioContext;
      } catch (error) {
        return null;
      }
    }

    function chooseMimeType() {
      const candidates = [
        "video/mp4;codecs=avc1.42E01E,mp4a.40.2",
        "video/mp4",
        "video/webm;codecs=vp9,opus",
        "video/webm;codecs=vp8,opus",
        "video/webm"
      ];

      return candidates.find((type) => MediaRecorder.isTypeSupported(type)) || "";
    }

    function getCanvasScale(video) {
      const maxSide = 1080;
      const longest = Math.max(video.videoWidth || 0, video.videoHeight || 0);
      if (!longest || longest <= maxSide) {
        return 1;
      }
      return maxSide / longest;
    }

    function drawUntilDone(ctx, video, settings, timelineSteps, totalSeconds, scale) {
      return new Promise((resolve) => {
        const frame = () => {
          const current = Math.min(video.currentTime || 0, totalSeconds);
          drawVideoFrame(ctx, video, settings, timelineSteps, current, scale);
          progressBar.style.width = clamp((current / totalSeconds) * 100, 0, 100) + "%";
          timeText.textContent = current.toFixed(1) + " / " + MAX_SECONDS.toFixed(1) + "秒";

          if (current >= totalSeconds - 0.04 || video.ended) {
            video.pause();
            resolve();
            return;
          }

          requestAnimationFrame(frame);
        };

        requestAnimationFrame(frame);
      });
    }

    function drawVideoFrame(ctx, video, settings, timelineSteps, currentTime, scale) {
      const width = ctx.canvas.width;
      const height = ctx.canvas.height;
      ctx.clearRect(0, 0, width, height);
      ctx.drawImage(video, 0, 0, width, height);

      if (currentTime >= FINAL_LAYOUT_START) {
        drawFinalCaptionFrame(ctx, settings, scale);
        return;
      }

      const active = timelineSteps.find((step) => currentTime >= step.start && currentTime <= step.end);
      if (!active) {
        return;
      }

      const fontSizeForCanvas = Math.max(18, settings.fontSize * scale);
      const lineHeight = fontSizeForCanvas * 1.18;
      const maxWidth = width * 0.9;
      const lines = wrapCaptionText(ctx, active.text, maxWidth, fontSizeForCanvas);
      const blockHeight = lines.length * lineHeight;
      const x = width / 2;
      const y = height * 0.8 - blockHeight / 2 + lineHeight / 2;
      const strokeWidth = Math.max(2, fontSizeForCanvas * 0.065);

      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.lineJoin = "round";
      ctx.miterLimit = 2;
      ctx.font = "800 " + fontSizeForCanvas + "px 'Hiragino Sans', 'Yu Gothic', sans-serif";
      ctx.fillStyle = "#ffffff";
      ctx.strokeStyle = "#050608";
      ctx.lineWidth = strokeWidth;

      lines.forEach((line, index) => {
        const lineY = y + index * lineHeight;
        ctx.strokeText(line, x, lineY);
        ctx.fillText(line, x, lineY);
      });

      ctx.restore();
    }

    function drawFinalCaptionFrame(ctx, settings, scale) {
      const width = ctx.canvas.width;
      const height = ctx.canvas.height;
      const fontSizeForCanvas = Math.max(12, settings.fontSize * 0.38 * scale);
      const lineHeight = fontSizeForCanvas * 1.16;
      const strokeWidth = Math.max(2, fontSizeForCanvas * 0.12);

      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.lineJoin = "round";
      ctx.miterLimit = 2;
      ctx.font = "800 " + fontSizeForCanvas + "px 'Hiragino Sans', 'Yu Gothic', sans-serif";
      ctx.fillStyle = "#ffffff";
      ctx.strokeStyle = "#050608";
      ctx.lineWidth = strokeWidth;

      state.finalCaptions.forEach((caption) => {
        const maxWidth = width * (caption.width / 100);
        const lines = wrapCaptionText(ctx, caption.text, maxWidth, fontSizeForCanvas);
        const blockHeight = lines.length * lineHeight;
        const x = width * (caption.x / 100);
        const y = height * (caption.y / 100) - blockHeight / 2 + lineHeight / 2;

        lines.forEach((line, index) => {
          const lineY = y + index * lineHeight;
          ctx.strokeText(line, x, lineY);
          ctx.fillText(line, x, lineY);
        });
      });

      ctx.restore();
    }

    function wrapCaptionText(ctx, text, maxWidth, fontSizeForCanvas) {
      ctx.font = "900 " + fontSizeForCanvas + "px 'Hiragino Sans', 'Yu Gothic', sans-serif";
      const sourceLines = String(text || " ").split("\n");
      const lines = [];

      sourceLines.forEach((sourceLine) => {
        const chars = Array.from(sourceLine || " ");
        let current = "";
        chars.forEach((char) => {
          const next = current + char;
          if (ctx.measureText(next).width <= maxWidth || !current) {
            current = next;
            return;
          }
          lines.push(current);
          current = char;
        });
        lines.push(current);
      });

      return lines.slice(0, 5);
    }

    function buildTextShadow(color, strokeWidth) {
      const px = Math.max(1, Math.round(strokeWidth / 2));
      return [
        px + "px " + px + "px 0 " + color,
        "-" + px + "px " + px + "px 0 " + color,
        px + "px -" + px + "px 0 " + color,
        "-" + px + "px -" + px + "px 0 " + color
      ].join(", ");
    }

    async function openCameraRollSaveMenu() {
      if (!state.generatedBlob || !state.generatedFile) {
        setStatus("保存準備がまだできていません。もう一度押して準備してください。", "error");
        return;
      }

      const shareData = {
        title: "⚪︎⚪︎開示ステップメーカー",
        files: [state.generatedFile]
      };

      if (!window.isSecureContext || !navigator.share || !navigator.canShare || !navigator.canShare({ files: shareData.files })) {
        setStatus("この端末ではカメラロール保存メニューを開けません。通常ダウンロードは行いません。", "error");
        return;
      }

      try {
        await navigator.share(shareData);
        setStatus("保存メニューが完了しました。カメラロール以外の保存先はWeb側では判定できません。", "ok");
      } catch (error) {
        if (error.name === "AbortError") {
          setStatus("保存をキャンセルしました。必要ならもう一度押してください。", "error");
          return;
        }
        if (error.name === "NotAllowedError") {
          setStatus("この端末またはブラウザではカメラロール保存メニューが許可されていません。", "error");
          return;
        }
        setStatus("保存メニューを開けませんでした: " + error.message, "error");
      }
    }

    function clearGeneratedOutput(revoke = true) {
      state.generatedBlob = null;
      state.generatedFile = null;
      state.generatedSignature = "";
      if (revoke && state.generatedUrl) {
        URL.revokeObjectURL(state.generatedUrl);
      }
      state.generatedUrl = "";
    }

    function setStatus(message, type) {
      statusText.textContent = message;
      statusText.classList.toggle("is-ok", type === "ok");
      statusText.classList.toggle("is-error", type === "error");
    }

    function buildRenderSignature() {
      return JSON.stringify({
        maxSeconds: MAX_SECONDS,
        fontSize: CAPTION_FONT_SIZE,
        steps: getTimelineSteps().map((step) => ({
          text: step.text,
          start: step.start,
          end: step.end
        })),
        finalCaptions: state.finalCaptions.map((caption) => ({
          text: caption.text,
          x: caption.x,
          y: caption.y,
          width: caption.width
        }))
      });
    }

    function waitForEvent(target, eventName) {
      return new Promise((resolve, reject) => {
        if (eventName === "loadedmetadata" && target.readyState >= 1) {
          resolve();
          return;
        }

        const cleanup = () => {
          target.removeEventListener(eventName, onDone);
          target.removeEventListener("error", onError);
        };
        const onDone = () => {
          cleanup();
          resolve();
        };
        const onError = () => {
          cleanup();
          reject(new Error("動画を読み込めませんでした。"));
        };
        target.addEventListener(eventName, onDone, { once: true });
        target.addEventListener("error", onError, { once: true });
      });
    }

    function waitForReadyFrame(video) {
      return new Promise((resolve) => {
        const done = () => resolve();
        if (video.requestVideoFrameCallback) {
          video.requestVideoFrameCallback(done);
          setTimeout(done, 450);
          return;
        }
        setTimeout(done, 180);
      });
    }

    function saveSettings() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        steps: state.steps,
        finalCaptions: state.finalCaptions.map((caption) => ({ text: caption.text }))
      }));
    }

    function loadSettings() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        if (Array.isArray(saved.steps) && saved.steps.length) {
          state.steps = saved.steps.map((step) => ({
            text: typeof step.text === "string" ? step.text : "",
            start: Number(step.start) || 0,
            end: Number(step.end) || 2
          }));
        }
        if (Array.isArray(saved.finalCaptions)) {
          state.finalCaptions = DEFAULT_FINAL_CAPTIONS.map((caption, index) => ({
            ...caption,
            text: typeof saved.finalCaptions[index]?.text === "string" ? saved.finalCaptions[index].text : caption.text
          }));
        }
      } catch (error) {
        localStorage.removeItem(STORAGE_KEY);
      }
    }

    function buildTimestamp() {
      const now = new Date();
      const pad = (num) => String(num).padStart(2, "0");
      return [
        now.getFullYear(),
        pad(now.getMonth() + 1),
        pad(now.getDate()),
        "-",
        pad(now.getHours()),
        pad(now.getMinutes()),
        pad(now.getSeconds())
      ].join("");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function roundToTenth(value) {
      return Math.round(value * 10) / 10;
    }
  </script>
</body>
